<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gere seu Orçamento - Prime Marble Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#e8e8e8;overflow:hidden;height:100vh}
        .app{display:flex;height:100vh}

        .side{width:420px;background:#161625;border-right:1px solid #2a2a40;display:flex;flex-direction:column}
        .side-header{padding:20px 20px 0;text-align:center}
        .side-header h1{font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:-0.5px}
        .side-header p{font-size:0.8rem;color:#666;margin-top:2px}
        .side-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;margin:10px auto 0;display:block}
        .side-body{flex:1;overflow-y:auto;padding:16px 20px}
        .side-body::-webkit-scrollbar{width:5px}
        .side-body::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:5px}
        .side-footer{padding:12px 20px;border-top:1px solid #2a2a40}

        .steps{display:flex;gap:4px;margin:16px 0;padding:0 4px}
        .stp{flex:1;height:4px;border-radius:2px;background:#2a2a40;transition:.3s}
        .stp.done{background:#22c55e}
        .stp.cur{background:#d4a017}

        .step-title{font-size:1.05rem;font-weight:600;color:#fff;margin-bottom:4px}
        .step-desc{font-size:0.78rem;color:#888;margin-bottom:16px;line-height:1.4}

        .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .card{border:2px solid #2a2a40;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:.2s;background:#1a1a2e}
        .card:hover{border-color:#d4a017;transform:translateY(-2px)}
        .card.on{border-color:#d4a017;background:linear-gradient(135deg,#d4a01722,#1a1a2e)}
        .card .ico{font-size:1.8rem;margin-bottom:6px;display:flex;justify-content:center;align-items:center;min-height:30px}
        .card .name{font-size:0.82rem;font-weight:600;color:#ddd;display:block}
        .card .hint{font-size:0.68rem;color:#777;margin-top:3px;display:block}
        .cards.cols1{grid-template-columns:1fr}

        .mp{display:flex;height:22px;gap:2px;margin:0 auto 8px;max-width:120px;border-radius:3px;overflow:hidden}
        .mp div{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;color:#fff}
        .mp-m{background:#60a5fa}
        .mp-s{background:#9ca3af}
        .mp-l{flex-direction:column}
        .mp-l .mp-row{display:flex;width:100%;gap:2px}
        .mp-l .mp-arm{width:30%;margin-top:2px}

        .fgroup{margin-bottom:14px}
        .fgroup label{font-size:0.78rem;color:#999;display:flex;justify-content:space-between;margin-bottom:5px}
        .fgroup label span{color:#d4a017;font-weight:600}
        .fgroup input[type=range]{width:100%;accent-color:#d4a017;height:6px}
        .fgroup input[type=number]{width:100%;padding:8px 12px;border:1px solid #2a2a40;border-radius:8px;background:#1a1a2e;color:#e8e8e8;font-size:0.85rem}
        .fgroup input[type=number]:focus{outline:none;border-color:#d4a017}
        .fgroup select{width:100%;padding:8px 12px;border:1px solid #2a2a40;border-radius:8px;background:#1a1a2e;color:#e8e8e8;font-size:0.82rem}
        .fgroup select:focus{outline:none;border-color:#d4a017}

        .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

        .tog{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1a1a2e;border:1px solid #2a2a40;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.2s}
        .tog:hover{border-color:#444}
        .tog.on{border-color:#d4a01733;background:#d4a0170a}
        .tog .tl{font-size:0.82rem;color:#ddd}
        .tog .th{font-size:0.68rem;color:#777;margin-top:2px}
        .tog .sw{width:40px;height:22px;border-radius:11px;background:#2a2a40;position:relative;transition:.3s;flex-shrink:0}
        .tog.on .sw{background:#d4a017}
        .tog .sw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.3s}
        .tog.on .sw::after{left:21px}
        .tog-extra{display:none;padding:0 4px 10px;margin-top:-4px}
        .tog.on+.tog-extra{display:block}

        .edge-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;padding:10px 12px;background:#1a1a2e;border:1px solid #2a2a40;border-radius:10px}
        .edge-label{font-size:0.8rem;color:#ccc;font-weight:500}
        .edge-opts{display:flex;flex-direction:column;gap:4px}
        .edge-extra{margin-top:4px}
        .edge-opt{padding:5px 10px;border:1px solid #2a2a40;border-radius:6px;background:transparent;color:#999;cursor:pointer;font-size:0.72rem;transition:.2s;font-weight:500}
        .edge-opt:hover{border-color:#666}
        .edge-opt.on{color:#fff;border-color:transparent;font-weight:600}
        .edge-opt.t-fronte.on{background:#e63946}
        .edge-opt.t-saia.on{background:#2a9d8f}
        .edge-opt.t-parede.on{background:#6c757d}
        .edge-opt.t-livre.on{background:#888}
        .edge-opt.t-ilharga.on{background:#d97706}

        .btns{display:flex;gap:10px}
        .btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:.2s}
        .btn-back{background:#2a2a40;color:#aaa}
        .btn-back:hover{background:#353550}
        .btn-next{background:#d4a017;color:#fff}
        .btn-next:hover{background:#b8890f}

        .info{background:#d4a01711;border:1px solid #d4a01733;border-radius:8px;padding:10px 12px;font-size:0.72rem;color:#e8c86a;line-height:1.5;margin-top:10px}
        .info b{color:#d4a017}

        .resumo-table{width:100%;font-size:0.8rem}
        .resumo-table td{padding:5px 0;border-bottom:1px solid #2a2a40}
        .resumo-table td:first-child{color:#999}
        .resumo-table td:last-child{color:#ddd;text-align:right;font-weight:500}

        .viewer{flex:1;position:relative;background:#1a1a2e}
        #c2d{width:100%;height:100%;display:block}
        .v-info{position:absolute;top:16px;right:16px;background:#161625dd;padding:14px 16px;border-radius:10px;border:1px solid #2a2a40;font-size:0.75rem;max-width:260px;backdrop-filter:blur(10px)}
        .v-info h4{color:#d4a017;font-size:0.8rem;margin-bottom:6px}
        .v-info p{color:#aaa;margin-bottom:3px}
        .btn-home{padding:8px 16px;background:#d4a017;color:#fff;border:none;border-radius:20px;font-size:0.8rem;cursor:pointer;text-decoration:none;font-weight:600;position:absolute;top:16px;left:16px;z-index:5}
        .btn-home:hover{background:#b8890f}

        .hidden{display:none!important}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
        .modal-box{background:#1e1e30;border:1px solid #2a2a40;border-radius:16px;padding:30px 28px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .modal-box .modal-icon{font-size:2rem;margin-bottom:12px}
        .modal-box .modal-msg{font-size:0.9rem;color:#ddd;line-height:1.5;margin-bottom:20px}
        .modal-box .modal-btn{padding:10px 32px;background:#d4a017;color:#fff;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:.2s}
        .modal-box .modal-btn:hover{background:#b8890f}

        @media(max-width:900px){
            body{overflow:auto;height:auto;min-height:100vh}
            .app{flex-direction:column;height:auto;min-height:100vh}
            .side{width:100%;height:55vh;border-right:none;border-bottom:1px solid #2a2a40;overflow-y:auto;-webkit-overflow-scrolling:touch}
            .side-header{padding:14px 20px 0}
            .side-logo{width:74px;height:74px;margin:6px auto 0}
            .side-header h1{font-size:1.15rem;margin-top:6px}
            .side-body{flex:0 0 auto;overflow:visible;padding:14px 20px 88px}
            .side-footer{position:sticky;bottom:0;background:#161625;z-index:20;box-shadow:0 -8px 18px rgba(0,0,0,.18)}
            .side-header.mobile-compact .side-logo,
            .side-header.mobile-compact h1{display:none}
            .side-header.mobile-compact{padding-top:10px}
            .side-header.mobile-compact .steps{margin:6px 0 8px}
            .viewer{height:45vh;min-height:45vh}
        }
    </style>
</head>
<body>
<div class="app">
    <div class="side">
        <div class="side-header">
            <img src="{{ empresa_logo_url }}" class="side-logo" alt="Logo">
            <h1>Gere seu Orçamento</h1>
            <div class="steps" id="stepsBar"></div>
        </div>
        <div class="side-body" id="sideBody"></div>
        <div class="side-footer">
            <div class="btns">
                <button type="button" class="btn btn-back hidden" id="btnBack" onclick="goBack()">Voltar</button>
                <button type="button" class="btn hidden" id="btnContinuar" onclick="continuarOrcamento()" style="flex:1;padding:12px;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;background:#22c55e;color:#fff">+ Adicionar Produto</button>
                <button type="button" class="btn btn-next" id="btnNext" onclick="goNext()">Continuar</button>
            </div>
        </div>
    </div>
    <div class="viewer">
        {% if logado %}<a href="/" class="btn-home">&#8592; Início</a>{% endif %}
        <canvas id="c2d"></canvas>
        <div class="v-info" id="vInfo"></div>
    </div>
</div>
<div class="modal-overlay hidden" id="modalOverlay" onclick="fecharModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-icon" id="modalIcon">&#9888;</div>
        <div class="modal-msg" id="modalMsg"></div>
        <button type="button" class="modal-btn" onclick="fecharModal()">OK</button>
    </div>
</div>
<script>
function mostrarAviso(msg) {
    document.getElementById('modalMsg').textContent = msg;
    document.getElementById('modalOverlay').classList.remove('hidden');
}
function fecharModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
}
</script>
<script src="{{ url_for('static', filename='js/configurador.js') }}?v={{ range(1,99999) | random }}"></script>
</body>
</html>
