<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Prime Marble Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pilot.css') }}">
</head>
<body class="pilot-body">
    <main class="auth-wrap">
        <section class="auth-card">
            <div class="auth-side">
                <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Prime Marble Shop">
                <h1>Prime Marble Shop</h1>
                <p>Acesse o painel local para testar clientes, orcamentos, materiais e ordens de servico antes de publicar.</p>
            </div>

            <div class="auth-form">
                <h2>Entrar no sistema</h2>
                <p class="hint">Use seu CPF/CNPJ e senha cadastrados.</p>

                <form method="POST">
                    <div class="form-field">
                        <label for="cpf">CPF/CNPJ</label>
                        <input type="text" id="cpf" name="cpf" autocomplete="username" required>
                    </div>

                    <div class="form-field">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" autocomplete="current-password" required>
                    </div>

                    <button type="submit" class="auth-submit">Entrar</button>
                </form>

                {% if error %}
                    <p class="auth-message">{{ error }}</p>
                {% endif %}
            </div>
        </section>
    </main>
</body>
</html>
