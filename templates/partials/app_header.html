<style>
    :root {
        --brand: {{ empresa_config.cor_primaria or '#4e73df' }};
        --brand-dark: {{ empresa_config.cor_primaria or '#2e59d9' }};
    }
</style>
<header class="pilot-topbar app-standard-header">
    <div class="pilot-brand">
        <img src="{{ empresa_logo_url }}" class="pilot-logo home-logo" alt="{{ empresa_nome }}">
        <div class="pilot-brand-copy">
            <div class="pilot-brand-row">
                <p class="pilot-brand-title">{{ empresa_nome }}</p>
                <details class="profile-menu profile-menu-mobile">
                    <summary>{{ usuario_display_nome }}</summary>
                    <div class="profile-menu-panel">
                        <a href="{{ url_for('alterar_senha') }}">Alterar senha</a>
                        <a href="{{ url_for('logout') }}" class="danger">Sair</a>
                    </div>
                </details>
            </div>
            {% if header_subtitle %}
                <p class="pilot-brand-subtitle">{{ header_subtitle }}</p>
            {% endif %}
        </div>
    </div>

    <div class="pilot-user">
        {% if request.endpoint != 'index' %}
            <a href="{{ url_for('index') }}" class="pilot-btn">Página inicial</a>
        {% endif %}
        <details class="profile-menu profile-menu-desktop">
            <summary>{{ usuario_display_nome }}</summary>
            <div class="profile-menu-panel">
                <a href="{{ url_for('alterar_senha') }}">Alterar senha</a>
                <a href="{{ url_for('logout') }}" class="danger">Sair</a>
            </div>
        </details>
    </div>
</header>
