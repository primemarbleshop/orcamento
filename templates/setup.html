<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuracao Inicial</title>
    <style>
        body {
            position: relative;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("{{ url_for('static', filename='logo.jpg') }}");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.1;
            z-index: -1;
        }
        .container {
            text-align: center;
            margin-top: 80px;
        }
        .setup-box {
            background-color: #f8f9fa;
            border: 2px solid black;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }
        .setup-box p {
            color: #555;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input {
            width: 250px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 4px;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #d4a017;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
        }
        button:hover {
            background-color: #b8860b;
        }
        .flash-error {
            color: red;
            margin-top: 10px;
        }
        .flash-success {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prime Marble Shop</h1>
        <div class="setup-box">
            <h2>Configuracao Inicial</h2>
            <p>Nenhum usuario cadastrado. Crie o administrador para comecar.</p>
            <form method="POST">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Nome do administrador" required>

                <label for="cpf">CPF/CNPJ:</label>
                <input type="text" id="cpf" name="cpf" placeholder="Seu CPF ou CNPJ" required>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

                <br>
                <button type="submit">Criar Administrador</button>
            </form>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <p class="flash-{{ category }}">{{ message }}</p>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>
    </div>
</body>
</html>
